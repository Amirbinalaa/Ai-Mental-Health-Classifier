name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "amirbinalaa@gmail.com"
          git config --global user.name "Amirbinalaa"
          git remote add hf https://AlaaAlaa08:$HF_TOKEN@huggingface.co/spaces/AlaaAlaa08/Ai-Mental-Health-Monitor
          git push --force hf main
